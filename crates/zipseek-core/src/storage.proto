syntax = "proto3";

package storage;

message Lexeme {
    uint64 id = 1;
    repeated LexicalVariant variants = 2;
    string simplified = 3;
    repeated PartOfSpeech part_of_speech = 8;
    repeated ReferenceStandard standards = 9;
}

message LexicalVariant {
    string traditional = 1;
    repeated string pinyin = 2;
    repeated Sense senses = 3;
    repeated Classifier classifiers = 4;
    repeated Reference references = 5;
}

message Sense {
    repeated string glosses = 1;
    repeated string tags = 2;
    optional string qualifier = 3;
    repeated PartOfSpeech part_of_speech = 4;
}

message Classifier {
    string traditional = 1;
    optional string simplified = 2;
    string pinyin = 3;
}

message Reference {
    ReferenceKind kind = 1;
    string traditional = 2;
    optional string simplified = 3;
    repeated string pinyin = 4;
}

message ReferenceStandard {
    string name = 1;
    string kind = 2;
    string value = 3;
}

enum PartOfSpeech {
    Noun = 0;
    Verb = 1;
    Adjective = 2;
    Adverb = 3;
    Pronoun = 4;
    Numeral = 5;
    MeasureWord = 6;
    Conjunction = 7;
    Preposition = 8;
    Particle = 9;
    Interjection = 10;
    Unknown = 11;
}

enum ReferenceKind {
    UNKNOWN = 0;
    SEE = 1;
    VARIANT = 2;
    ABBREVIATION = 3;
    ALSOWRITTEN = 4;
}

message Shard {
    uint64 shard_id = 1;
    repeated Lexeme lexemes = 2;
}

message HashToLexeme {
    repeated Entry entries = 1;

    message Entry {
        uint64 hash = 1;
        uint64 lexeme_id = 2;
    }
}